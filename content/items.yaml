version: 1
categories:
  - id: allgemeine
    title: Allgemein
    description: Legen Sie die allgemeinen Anforderungen fest, welche die Lernenden stets übergreifend zu beachten haben.
    items:
      - id: abgabe
        label: Rechtzeitige Abgabe
      - id: dateinamen
        label: Verwendung der vereinbarten Dateinamen und -pfade
      - id: regeln
        label: Berücksichtigung der vereinbarten Regeln und Vorgaben
      - id: vollstaendigkeit
        label: Vollständigkeit der geforderten Unterlagen
      - id: quellenangaben
        label: Quellenangaben vorhanden

  - id: produktebene
    title: Produktebene
    description: Produktspezifische Anforderungen gemäß Prüfungsformat.
    items:
      - id: produktspez_anforderungen
        label: Produktspezifische Kriterien (formatabhängig)
      - id: zielerreichung
        label: Zielerreichung im Kontext des Formats

  - id: sachebene
    title: Sachebene
    description: Erwartungshorizont hinsichtlich Wissenszuwachs und Darstellung.
    items:
      - id: tiefe
        label: Tiefe und Umfang der fachlichen Auseinandersetzung
      - id: komplexitaet
        label: Komplexität des Inhalts
      - id: eigeninitiative
        label: Eigeninitiative durch eigenständige Recherche und zusätzliche Perspektiven
      - id: selbststaendigkeit
        label: Selbstständigkeit in der Auseinandersetzung mit dem Inhalt

  - id: praesentation
    title: Präsentation
    description: Parameter für Bewertung der Präsentation.
    items:
      - id: koerpersprache
        label: Körpersprache und Blickkontakt
      - id: aktivierend
        label: Aktivierende Elemente
      - id: sprachlicher_ausdruck
        label: Sprachlicher Ausdruck
      - id: eigeninitiative_praes
        label: Eigeninitiative
      - id: kreativitaet
        label: Kreativität
      - id: adressatenaufbereitung
        label: Adressatengerechte Aufbereitung

  - id: reflexion
    title: Reflexion
    description: Parameter für Bewertung der Reflexion.
    items:
      - id: tiefe_reflexion
        label: Tiefe und Differenziertheit der Prozessreflexion
      - id: analyse_schwierigkeiten
        label: Identifikation/Analyse von Schwierigkeiten
      - id: loesungsvorschlaege
        label: Konkrete, nachvollziehbare Lösungsvorschläge

  - id: darstellung
    title: Darstellung
    description: Parameter für Bewertung der Darstellung.
    items:
      - id: gestaltung
        label: Gestaltung (ansprechendes Layout, visuelle Attraktivität)
      - id: farb_schrift
        label: Einheitliches Farb- und Schriftkonzept
      - id: optische_konsistenz
        label: Optische Konsistenz
      - id: thematisches_design
        label: Thematisch passendes und unterstützendes Design

  - id: peer
    title: "Peer-Feedback / Reflexion"
    description: Aspekte aus Arbeits- und Präsentationsphase mit Einfluss auf den Wissenszuwachs.
    items:
      - id: erfolg_arbeitsphase
        label: Erfolg der Arbeitsphase
      - id: mitarbeit_gruppe
        label: Mitarbeit im Gruppenprozess
      - id: aktivierende_elemente
        label: Aktivierende Elemente (z. B. Interaktionsmethoden)
      - id: adressaten_praesentation
        label: Adressatengerechte Präsentation
      - id: persoenlicher_wissenszuwachs
        label: Persönlicher Wissenszuwachs
      - id: wissenszuwachs_zuhoerer
        label: Wissenszuwachs des Zuhörers

  - id: prozess
    title: Prozessdokumentation
    items:
      - id: planungsunterlagen
        label: Planungsunterlagen / Prozessdokumentation
      - id: nachvollziehbarkeit
        label: Nachvollziehbarkeit und Verständlichkeit
      - id: ki_angaben
        label: KI-Einsatz – Angabe/Beschreibung verwendeter Prompts und Tools
      - id: ki_nachvollziehbar
        label: KI-Einsatz nachvollziehbar erklärt
      - id: ki_reflexion
        label: KI-Einsatz kritisch reflektiert (Nutzen/Risiken)
      - id: eigenes_potential
        label: Persönliches Entwicklungspotential

scales:
  - id: verbal_5
    kind: verbal
    labels: ["trifft voll zu","trifft eher zu","teils/teils","trifft eher nicht zu","trifft nicht zu"]
  - id: punkte_10
    kind: numeric
    min: 0
    max: 10
  - id: emoji_3
    kind: emoji
    set: ["😀","😐","☹️"]
  - id: ampel
    kind: traffic
    colors: ["#2e7d32","#fbc02d","#c62828"]
  - id: prozent
    kind: percent
  - id: yes-no
    kind: numeric
    set: ["Ja","Nein"]
