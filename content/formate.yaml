version: 1
groups:
  - id: textprodukte
    title: Textprodukte
    formats:
      - id: eine-rede-schreiben
        title: Eine Rede schreiben
        criteria:
          - label: thematisch klare und überzeugende Rede
          - label: Nutzung typischer Merkmale einer Rede
          - aspect: Bei Audio-/Videoaufnahme zusätzlich
            label: originelle filmische Umsetzung
          - aspect: Bei Audio-/Videoaufnahme zusätzlich
            label: technische Qualität des Videoclips (Kombination aus klarem, verständlichem Ton, sauberem/ruhigem Bild und strukturiertem Schnitt)
      - id: fiktive-dialoge-mit-ki-persona
        title: Fiktive Dialoge mit KI-Persona
        criteria:
          - aspect: Produktebene / Interaktion
            label: Präzision und Klarheit der Prompts
          - aspect: Produktebene / Interaktion
            label: effektive Nutzung der KI-Antworten
          - aspect: Produktebene / Interaktion
            label: klare und adressatengerechte Rollenbeschreibung
          - aspect: Dokumentation
            label: strukturierte Speicherung der KI-Antworten
          - aspect: Dokumentation
            label: verständliche Zusammenfassung der KI-Antworten
          - aspect: Dokumentation
            label: fachlich korrekte und angemessene Dokumentation
          - aspect: Rollenadäquanz
            label: kreativer Umgang mit der simulierten KI-Rolle
          - aspect: Rollenadäquanz
            label: rollenadäquate Nutzung der KI-Funktion
          - aspect: Rollenadäquanz
            label: Einbindung relevanter und zusätzlicher Inhalte über die KI-Antworten hinaus
          - aspect: Eigenständigkeit und Reflexion
            label: eigenständige Entwicklung von Fragen und Prompts
          - aspect: Eigenständigkeit und Reflexion
            label: kritische Prüfung der KI-Antworten
          - aspect: Eigenständigkeit und Reflexion
            label: reflexiver Umgang mit der Qualität der KI-Antworten
          - aspect: Eigenständigkeit und Reflexion
            label: Bewertung von Mehrwert und Limitationen des KI-Einsatzes
          - aspect: Eigenständigkeit und Reflexion
            label: persönlicher Erkenntnisgewinn durch die Arbeit mit der KI
          - aspect: Prozessdokumentation
            label: nachvollziehbare Dokumentation der verwendeten Prompts und deren Wirkung
          - aspect: Prozessdokumentation
            label: Angabe der genutzten Tools und deren Funktion im Arbeitsprozess
          - aspect: KI-Einsatz (Reflexion und Steuerung)
            label: kritische Reflexion der Stärken und Schwächen der KI
          - aspect: KI-Einsatz (Reflexion und Steuerung)
            label: Darstellung von Erkenntnissen zu Steuerung und Limitierungen der KI
          - aspect: KI-Einsatz (Reflexion und Steuerung)
            label: nachvollziehbare Begründung für Auswahl und Anpassung der Prompts
      - id: literarische-figuren-und-fingierte-zeitzeugen-mit-ki-generieren
        title: Literarische Figuren und fingierte Zeitzeugen mit KI generieren
        criteria:
          - aspect: Inhaltliches Verständnis und Figurenanalyse
            label: treffende Darstellung der Hauptfigur (Aussehen, Haltung und Kleidung entsprechend der Buchbeschreibung)
          - aspect: Inhaltliches Verständnis und Figurenanalyse
            label: monologische Darstellung mit Bezug zur Buchvorlage
          - aspect: Inhaltliches Verständnis und Figurenanalyse
            label: vertieftes Verständnis der Figur (Gedanken, Gefühle, Motive)
          - aspect: Inhaltliches Verständnis und Figurenanalyse
            label: origineller und glaubwürdiger Monolog in Bezug auf die Figur
          - aspect: Bildgestaltung mit KI
            label: passgenaue Umsetzung der Buchbeschreibung im generierten Bild
          - aspect: Bildgestaltung mit KI
            label: berücksichtigte Details (Zeit, Ort, Epoche)
          - aspect: Bildgestaltung mit KI
            label: begründete Wahl der Bildeingaben
          - aspect: Videoumsetzung mit KI
            label: überzeugende Stimmführung und Sprachgestaltung (Betonung, Ausdruck)
          - aspect: Videoumsetzung mit KI
            label: gezielter Einsatz von Mimik, Gestik und gegebenenfalls KI-Animation
          - aspect: Videoumsetzung mit KI
            label: technische Qualität von Bild und Ton
          - aspect: Videoumsetzung mit KI
            label: angemessener Einsatz von Tools (Avatar-Animation, Hintergrundgestaltung)
      - id: ki-unterstuetzte-stellungnahme-zu-einem-thema
        title: KI-unterstützte Stellungnahme zu einem Thema
        criteria:
          - aspect: Prozessdokumentation
            label: transparente Dokumentation der KI-Nutzung (Prompts und Tools)
          - aspect: Prozessdokumentation
            label: nachvollziehbarer Einsatz der KI im Arbeitsprozess
          - aspect: Kritische Reflexion
            label: differenzierte Reflexion über die Leistungen der KI
          - aspect: Kritische Reflexion
            label: Kennzeichnung eigenständiger Arbeitsanteile
          - aspect: Weitere Hinweise
            label: vollständige Markierung aller KI-generierten Textteile
          - aspect: Weitere Hinweise
            label: kreative Kombination von KI-Inhalten mit eigenem Transfer (z. B. lokale Fallbeispiele)
      - id: diy-klassenarbeit
        title: DIY-Klassenarbeit
        criteria:
          - aspect: Aufgabenerstellung
            label: klare, verständliche und angemessen anspruchsvolle Aufgaben
          - aspect: Aufgabenerstellung
            label: Berücksichtigung verschiedener Anforderungsniveaus
          - aspect: Musterlösung
            label: fachlich korrekte und nachvollziehbare Lösungen
          - aspect: Musterlösung
            label: verständliche Erläuterung der Lösungswege
          - aspect: Begründung der Aufgabenwahl
            label: sinnvolle Begründung der Aufgabenwahl
          - aspect: Begründung der Aufgabenwahl
            label: transparente Darstellung der geprüften Kompetenzen
          - aspect: Testlauf und Überarbeitung
            label: Durchführung eines Testlaufs mit Lernenden
          - aspect: Testlauf und Überarbeitung
            label: Berücksichtigung von konstruktivem Feedback bei der Überarbeitung
          - aspect: Reflexion
            label: kritische Reflexion des eigenen Vorgehens
          - aspect: Reflexion
            label: nachvollziehbare Beschreibung von Herausforderungen und Lösungsansätzen
          - aspect: Prozessdokumentation (bei KI-Einsatz)
            label: reflektierter Einsatz der KI im Erstellungsprozess
      - id: open-media-book-pruefung
        title: Open Media / Book Prüfung
        criteria:
          - label: Übertragung von Wissen auf neue Fragestellungen
          - label: Leistungsverbesserung gegenüber der klassischen Arbeit
          - label: Einhaltung aller Vorgaben zur Hilfsmittelnutzung
          - label: Überprüfung identischer Kompetenzbereiche in beiden Prüfungsformaten
      - id: klassenarbeit-a-la-carte
        title: Klassenarbeit à la Carte
        criteria:
          - label: vollständige Bearbeitung aller gewählten Aufgaben
          - label: durchdachte, logisch aufgebaute und gut begründete Antworten
          - label: persönliche Note und eigenständige Lösungswege
          - label: angemessene Rechtschreibung, Grammatik und Struktur
          - label: nachvollziehbare Begründung der Aufgabenauswahl
          - label: Einhaltung aller Vorgaben
          - label: Gewährleistung einer fairen Leistungsbewertung trotz individueller Auswahl (Vergleichbarkeit)
          - aspect: Optional
            label: kreative Zusatzleistung (z. B. Nachspeise)
      - id: prozessbegleitender-blog
        title: Prozessbegleitender Blog
        criteria:
          - label: Auswahl und Bewertung besonders gelungener Beiträge nach festgelegten Kriterien (Portfolio-Ansatz)
          - label: Bewertung des gesamten Blogs anhand transparenter Kriterien
          - label: eigenständige Selbstbewertung durch die Lernenden als Teil des Verfahrens
      - id: wiki
        title: Wiki
        criteria:
          - label: Auswahl und Bewertung besonders gelungener Beiträge im Wiki nach festgelegten Kriterien (Portfolio-Ansatz)
          - label: Bewertung des gesamten Wikis anhand transparenter Kriterien
          - label: eigenständige Selbstbewertung durch die Lernenden als Teil des Bewertungsverfahrens
  - id: fotoprodukte
    title: Fotoprodukte
    formats:
      - id: fotostory
        title: Fotostory
        criteria:
          - label: inhaltliche Tiefe und fachlicher Bezug zum Thema
          - label: klarer und nachvollziehbarer Handlungsaufbau
          - label: strukturierter Verlauf der Präsentation oder des Beitrags
          - label: ansprechende Bildgestaltung
          - label: technische Qualität der Bildumsetzung
          - label: präziser und adressatengerechter Sprachgebrauch
          - label: verständliche und strukturierte Textgestaltung
          - label: kreative Gestaltungsideen
          - label: überzeugender persönlicher Ausdruck
          - label: adressatengerechte Präsentation
          - label: reflektierter Umgang mit dem eigenen Beitrag oder Produkt
      - id: social-media-post
        title: Social Media Post
        criteria:
          - label: attraktives und ansprechendes Design (Farben, Schriftart, Bilder)
          - label: verständliche und prägnante Formulierung der Botschaft
          - label: sinnvolle Aufteilung in Bild- und Textelemente (Slides)
          - label: korrekte Umsetzung der Bildformate und Zeichenbegrenzungen
          - aspect: Hashtags
            label: passende Auswahl relevanter Hashtags (mindestens 3, maximal 10)
          - aspect: Hashtags
            label: gezielte Aufforderung an die Zielgruppe (z. B. Like / Teile / Kommentiere)
          - aspect: Optional (Peer-Feedback)
            label: Einholung von Rückmeldungen durch Präsentation des Posts in der Gruppe
          - aspect: Optional (Peer-Feedback)
            label: Sammlung von Verbesserungsvorschlägen und Lob durch Mitschüler (z. B. Like / Dislike, Kommentare)
      - id: social-media-profil
        title: Social Media Profil
        criteria:
          - label: konsistente und ansprechende Profil-Ästhetik
          - label: klare und übersichtliche Struktur der Inhalte
          - label: authentische und zielgruppenrelevante Darstellung der Inhalte
          - label: gezielte Ansprache und Einbindung potenzieller Follower
          - label: Analyse und sinnvolle Nutzung von Hashtags
          - label: kreative und inhaltlich passende Bildunterschriften
          - label: gezielter Einsatz von Stories zur Ergänzung der Profilinhalte
  - id: audioprodukte
    title: Audioprodukte
    formats:
      - id: podcast
        title: Podcast
        criteria:
          - aspect: Aufbau und Struktur
            label: wirkungsvolle Eröffnung (catching ear opener)
          - aspect: Aufbau und Struktur
            label: klar erkennbare, sinnvolle Struktur der einzelnen Teile
          - aspect: Aufbau und Struktur
            label: logischer und zusammenhängender Verlauf (Fragestellung, Spannungsbogen, Inhalt, Diskussion, Fazit)
          - aspect: Aufbau und Struktur
            label: ausgewogener Anteil der einzelnen Sprecher
          - aspect: Gestaltung und Technik
            label: auditive Effekte
          - aspect: Gestaltung und Technik
            label: Soundauswahl
          - aspect: Gestaltung und Technik
            label: sauberer Schnitt
          - aspect: Gestaltung und Technik
            label: angemessene Bearbeitung
          - aspect: Sprache
            label: Aussprache
          - aspect: Sprache
            label: Intonation
          - aspect: Sprache
            label: Tempo
          - aspect: Sprache
            label: Modulation
          - aspect: Sprache
            label: freies Sprechen
      - id: hoerspiel-und-hoerbuch
        title: Hörspiel und Hörbuch
        criteria:
          - label: Einhaltung der maximalen Hörspiel-Dauer (10 Minuten zuzüglich Intro und Abspann)
          - label: eigenständig entwickelte oder rechtlich einwandfrei vertonte Geschichte
          - label: Beachtung des Urheberrechts und Einholung erforderlicher Einwilligungen
          - label: selbst hergestellte Geräusche und Musik
          - label: Nutzung und Kennzeichnung offizieller Quellen bei Bedarf
          - label: gute Tonqualität und sauberer Schnitt (Entfernung von Nebengeräuschen und Versprechern)
          - label: prägnante Beschreibung des Hörspiels
          - label: eigenständige Durchführung der Produktion durch die Lernenden (zurückhaltende Unterstützung durch Erwachsene)
          - label: freie und empathische Gestaltung der Dialoge
      - id: musikalisches-kreativprojekt
        title: Musikalisches Kreativprojekt
        criteria:
          - label: Originalität der musikalischen Interpretation
          - label: technische Qualität der Umsetzung
          - label: innovative Nutzung der KI-Technologie im kreativen Prozess
          - label: überzeugende und adressatengerechte Präsentation
          - label: reflektierter Umgang mit dem eigenen kreativen Prozess
          - label: angemessene Komplexität des Projekts
          - label: ausdrucksstarke musikalische Gestaltung
          - label: klare und nachvollziehbare Verbindung zwischen Text und Musik
  - id: videoprodukte
    title: Videoprodukte
    formats:
      - id: kurzfilm
        title: Kurzfilm
        criteria:
          - aspect: Bei Fokus auf filmischen Mitteln
            label: sinnvoller Einsatz filmischer Mittel in Produktion und Nachbearbeitung (Einstellungen, Kameraperspektiven, Schnitt/Montage, Ton)
          - aspect: Bei Fokus auf filmischen Mitteln
            label: kreative Umsetzung
          - aspect: Bei Fokus auf Inhalt
            label: angemessenes Verhältnis und Zusammenspiel auf inhaltlicher und filmischer Ebene
          - aspect: Bei Fokus auf Inhalt
            label: nachvollziehbare/erkennbare Umsetzung der Wirkungsabsicht
      - id: vorgangsanalyse-mit-der-kamera-app
        title: Vorgangsanalyse mit der Kamera-App
        criteria:
          - aspect: Technische Umsetzung
            label: überzeugende Qualität der Aufnahmen (z. B. Stabilität)
          - aspect: Technische Umsetzung
            label: korrekte Nutzung der Kamerafunktionen
          - aspect: Technische Umsetzung
            label: passgenaue Auswahl der Zeitlupen- oder Zeitrafferfunktion für den jeweiligen Vorgang
          - aspect: Inhaltliche Analyse
            label: angemessene Tiefe der Analyse
          - aspect: Inhaltliche Analyse
            label: präzise Analyse
          - aspect: Inhaltliche Analyse
            label: Nachvollziehbarkeit der beschriebenen Beobachtungen
          - aspect: Kreativität und Gestaltung
            label: innovative und anschauliche Präsentation der Ergebnisse
          - aspect: Kreativität und Gestaltung
            label: adressatenangemessene visuelle und didaktische Aufbereitung (z. B. Diagramme, Standbilder, Vergleiche)
      - id: erklaerfilme-erstellen-verbessern-und-remixen
        title: Erklärfilme erstellen, verbessern und remixen
        criteria:
          - label: logischer Aufbau
          - label: zusammenhängende Struktur
          - label: sinnhafte Gestaltung
          - label: angemessene und übersichtliche Bearbeitung
  - id: projekte
    title: Projekte
    formats:
      - id: forschungsprojekt
        title: Forschungsprojekt
        criteria:
          - label: klare und nachvollziehbare Fragestellung
          - label: zeitökonomische Planung
          - label: wissenschaftliche Methodik
          - label: sorgfältige und genaue Datenerfassung
          - label: fundierte Datenanalyse
          - label: gewissenhafte Dateninterpretation
      - id: sammlungsprojekt
        title: Sammlungsprojekt
        criteria:
          - label: angemessene inhaltliche Tiefe
          - label: sinnhafte Struktur und Ordnung
          - label: sorgfältige Dokumentation
          - label: ansprechende Gestaltung
          - aspect: Optional
            label: Eigenständigkeit und Kreativität (individuelle Formulierungen, themenspezifische Auswahl)
      - id: versuchsprotokoll
        title: Versuchsprotokoll
        criteria:
          - label: sorgfältige Dokumentation
          - label: sinnhafte Struktur, Ordnung und Nachvollziehbarkeit
          - label: fachliche Klarheit und angemessener Einsatz von Fachbegriffen
          - label: kreative Problemlösekompetenz
          - label: wissenschaftliche Sprache und Ausdrucksweise
      - id: upcycling-mit-tutorials
        title: Upcycling mit Tutorials
        criteria:
          - label: angemessene Funktionalität
          - label: kreative Problemlösekompetenz
          - label: sorgfältige Umsetzung
          - label: nachvollziehbare Darstellung des Arbeitsprozesses (z. B. Fotos, Videos, Arbeitsprotokolle)
          - label: Kombination aus Produktbewertung (gestalterische Qualität, angemessene Umsetzung der Anleitung, vorgenommene Verbesserungen) und Reflexion (Darstellung der Lerneffekte, sinnvolle Problemlösungsstrategien)
  - id: praesentations-und-darstellungsformen
    title: Präsentations- und Darstellungsformen
    formats:
      - id: digitales-portfolio
        title: Digitales Portfolio
        criteria:
          - label: kreative Gestaltung und Einbindung passender visueller Elemente
          - label: multimediale Umsetzung und korrekte technische Einbindung von Medien
          - label: zielgruppenorientierte gestalterische Umsetzung
      - id: multimediale-praesentation
        title: Multimediale Präsentation
        criteria:
          - label: sinnhafter und abwechslungsreicher Einsatz medialer Elemente
          - label: adressaten- und formatangemessene inhaltliche Aufbereitung des Themas
          - label: sinnvolle Reduktion der Inhalte und Quellen
          - label: Kenntlichmachung der Zuständigkeiten bei Gruppenarbeit
      - id: interaktive-mindmaps
        title: Interaktive Mindmaps
        criteria:
          - label: passende Vernetzung der Inhalte
          - label: klare Strukturierung
          - label: sinnvoller Einsatz von Medien
      - id: animierte-lernprodukte-mit-blockprogrammierung
        title: Animierte Lernprodukte mit Blockprogrammierung
        criteria:
          - label: passende Vernetzung der Inhalte
          - label: nachvollziehbares Storytelling
          - label: zuverlässige Funktionalität des Programms
          - label: niveauangemessene Komplexität der verwendeten Codeblöcke (z. B. Schleifen, Bedingungen, Interaktivität)
      - id: virtuelle-rundgaenge
        title: Virtuelle Rundgänge
        criteria:
          - label: angemessene Recherche
          - label: passende Vernetzung der Inhalte
          - label: funktionaler Aufbau des Rundgangs
          - label: kreative Einbindung (eigener) multimedialer Elemente
      - id: szenische-interpretation
        title: Szenische Interpretation
        criteria:
          - label: klare Strukturierung der Szenen
          - label: überzeugende schauspielerische Leistung
          - label: wirkungsvoller Einsatz von Kostümen, Requisiten, Bühnenbild, Licht und Musik
          - label: sinnvolle Raumnutzung
      - id: challenges
        title: Challenges
        criteria:
          - aspect: Spezifischer Hinweis
            label: Empfehlung zum Verzicht auf eine formale Prozessdokumentation zugunsten des kreativen und spontanen Arbeitsprozesses. (Die inhaltlichen Kriterien werden je nach konkreter Aufgabenstellung flexibel über das Schieberegler-Modell definiert).
      - id: debatte
        title: Debatte
        criteria:
          - label: überzeugende Sachkenntnis
          - label: klares Ausdrucksvermögen
          - label: angemessene Gesprächsfähigkeit
          - label: hinreichende Überzeugungskraft
          - aspect: Hinweis
            label: Nicht bewertet werden die reinen Deutschkenntnisse oder die politische Aussage, sondern die Beachtung der Regeln und das Stellen der Auseinandersetzung.
      - id: moderation
        title: Moderation
        criteria:
          - label: zielführende Vorbereitung
          - label: sinnvolle Strukturierung
          - label: klare Kommunikationsfähigkeit
          - label: aktivierender Einbezug der Teilnehmenden
          - label: nachvollziehbare Zusammenfassung
          - label: gelungenes Zeitmanagement
      - id: modellpraesentation
        title: Modellpräsentation
        criteria:
          - label: klare Themenabgrenzung und -umsetzung
          - label: nachvollziehbare Zweckerfüllung
          - label: stabile und saubere Bauweise
          - label: hohe Detailsorgfalt
          - label: angemessene Materialauswahl
          - label: kreative Umsetzung
          - label: lösungsorientierter Umgang mit Herausforderungen
          - label: hohe Eigenständigkeit
          - label: Nutzen von Skizzen/Bauplänen zur Transparenz der Planung
      - id: rollenspiele-und-simulationen
        title: Rollenspiele und Simulationen
        criteria:
          - aspect: Rollenspiele
            label: authentische Verkörperung
          - aspect: Rollenspiele
            label: effektive Kommunikation
          - aspect: Simulationen
            label: umfangreiche Analyse des simulierten Prozesses
          - aspect: Simulationen
            label: nachvollziehbare und fundierte Entscheidungen
          - aspect: Übergreifend
            label: Berücksichtigung der Reflexion zu Erfahrungen während der Simulation
          - aspect: Übergreifend
            label: Ableitung von Erkenntnissen aus dem Rollenspiel für die reale Situation
